<!--
Smoke Signal compaction-alert widget (final, locked 06-25-26).
Rendered via show_widget when context usage reaches 75%.
Substitute three tokens with the live footer values, then strip this comment:
  {{PRE}}  = footer text up to and including "ctx ~NNNk/1M "  (trailing space kept)
  {{PCT}}  = the percentage shown inside the brackets, e.g. "75%"
  {{POST}} = the rest of the footer, e.g. " | project ~$Y"
Thin half-size flame sits 1px to the right of the pulsing red percentage,
inline on the same baseline as the text. Smoke is three wavy lines rising and fading.
-->
<div style="padding: 1.25rem 0;">
<h2 class="sr-only">Compaction warning: context is near the limit. The percentage glows red with a small animated fire and smoke trails beside it.</h2>

<div style="display:flex; align-items:center; font-family:var(--font-mono); font-size:14px; color:var(--text-secondary); background:var(--surface-1); border-radius:10px; padding:14px 16px; line-height:1;">

  <div style="white-space:nowrap;">
    <span>{{PRE}}</span><span class="ss-pct">({{PCT}})</span><svg viewBox="0 0 24 52" width="13" height="28" style="overflow:visible; margin:0 5px 0 1px; vertical-align:baseline;">
      <g class="ss-smoke" style="animation-delay:0s;">
        <path d="M12 26 C8 21 16 17 12 12 C8 7 16 4 12 0" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <g class="ss-smoke" style="animation-delay:1.3s;">
        <path d="M12 26 C16 21 8 16 12 11 C16 6 9 3 12 0" fill="none" stroke="var(--text-muted)" stroke-width="1.3" stroke-linecap="round"/>
      </g>
      <g class="ss-smoke" style="animation-delay:2.4s;">
        <path d="M12 26 C9 22 15 18 12 14 C9 10 14 6 12 3" fill="none" stroke="var(--text-muted)" stroke-width="1.1" stroke-linecap="round"/>
      </g>
      <g transform="translate(0,24)">
        <path class="ss-flame-outer" d="M12 2 C14.5 9 17 11 16 18 C15 25 13 28 12 28 C11 28 9 25 8 18 C7 11 9.5 9 12 2 Z" fill="#E24B4A"/>
        <path class="ss-flame-mid" d="M12 8 C14 13 15 15 14.5 19 C14 24 12.7 26 12 26 C11.3 26 10 24 9.5 19 C9 15 10 13 12 8 Z" fill="#EF9F27"/>
        <path class="ss-flame-core" d="M12 14 C13 17 13.3 18 13 20.5 C12.7 23 12.4 24 12 24 C11.6 24 11.3 23 11 20.5 C10.7 18 11 17 12 14 Z" fill="#FAC775"/>
      </g>
    </svg><span>{{POST}}</span>
  </div>

</div>
</div>

<style>
.ss-pct { color:#E24B4A; font-weight:500; animation: ssPulse 1.4s ease-in-out infinite; }
@keyframes ssPulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }
.ss-flame-outer { transform-origin:12px 28px; animation: ssFlick 0.5s ease-in-out infinite alternate; }
.ss-flame-mid   { transform-origin:12px 26px; animation: ssFlick 0.35s ease-in-out infinite alternate; }
.ss-flame-core  { transform-origin:12px 24px; animation: ssFlick 0.28s ease-in-out infinite alternate; }
@keyframes ssFlick { from { transform:scaleX(0.9) scaleY(1.0); } to { transform:scaleX(1.06) scaleY(0.95); } }
.ss-smoke { opacity:0; transform-origin:12px 26px; animation: ssTrail 3.6s ease-out infinite; }
@keyframes ssTrail { 0% { opacity:0; transform:translateY(4px) scaleY(0.6); } 25% { opacity:0.55; } 100% { opacity:0; transform:translateY(-14px) scaleY(1.15); } }
</style>
